<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Grupo Milla — Reporte de Vendedores</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');
:root{--n1:#1A1A1A;--n2:#2D2D2D;--n3:#555;--g1:#F2F2F2;--g2:#E8E8E8;--g3:#D0D0D0;--r:#C0392B;--v:#27AE60;--a:#2980B9;--am:#F39C12;--verde:#27AE60;--bg:#F7F7F7;--card:#fff;--txt:#1A1A1A;--txt2:#555;--brd:#E8E8E8}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--txt);padding:20px 24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--n1)}
.logo span{color:var(--r)}
.sub{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:2px}
.card{background:var(--card);border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt2);margin-bottom:10px;font-weight:600}
.filtros{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.filtro-group{min-width:140px}
.filtro-group label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-bottom:5px;font-weight:600}
.suc-grid{display:flex;flex-wrap:wrap;gap:3px;max-height:140px;overflow-y:auto;padding:2px}
.chip{padding:3px 9px;border-radius:5px;font-size:10px;cursor:pointer;border:1.5px solid var(--g2);background:var(--card);color:var(--n1);font-family:'Outfit',sans-serif;font-weight:500;transition:all .15s;user-select:none}
.chip.active{background:var(--n1);color:#fff;border-color:var(--n1)}
.chip:hover{border-color:var(--n3)}
.chip.cat-chip.active{color:#fff}
select{padding:7px 10px;border:1.5px solid var(--g2);border-radius:7px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;background:var(--card);color:var(--n1);min-width:160px;cursor:pointer}
.btn-sm{padding:3px 9px;border-radius:5px;font-size:9px;cursor:pointer;border:1.5px solid var(--g3);background:var(--card);color:var(--n3);font-family:'Outfit',sans-serif;font-weight:600;margin-right:3px}
.btn-sm.primary{border-color:var(--r);background:var(--r);color:#fff}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.kpi .val{font-size:20px;font-weight:700;color:var(--n1)}
.kpi .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-top:2px}
.kpi .var{font-size:10px;font-weight:600;margin-top:3px}
.var.pos{color:var(--v)}.var.neg{color:var(--r)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
.chart-box{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-box h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-bottom:8px;font-weight:600}
.chart-wrap{position:relative;height:300px}
.filter-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--g1);padding:7px 6px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--n3);border-bottom:2px solid var(--g2);white-space:nowrap}
td{padding:6px;border-bottom:1px solid var(--g1);white-space:nowrap}
.mono{font-variant-numeric:tabular-nums;text-align:right}
tr:hover{background:rgba(0,0,0,.02)}
.top{font-weight:700}
.rn{text-align:center;color:var(--n3);font-size:10px;width:24px}
.empty{text-align:center;padding:40px;color:var(--n3);font-size:13px}
.tbl-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.sl{font-size:9px;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
</style>
</head>
<body>
<div class="header">
  <div><div class="logo">GRUPO <span>MILLA</span></div><div class="sub">Reporte de Vendedores</div></div>
  <div id="periodo-txt" style="font-size:11px;color:var(--txt2)"></div>
</div>
<div class="card">
  <div class="filtros">
    <div class="filtro-group" style="flex:2;min-width:240px">
      <label>Sucursales</label>
      <div style="margin-bottom:4px"><button class="btn-sm primary" onclick="selTodas()">Todas</button><button class="btn-sm" onclick="selNinguna()">Ninguna</button></div>
      <div class="suc-grid" id="suc-chips"></div>
    </div>
    <div class="filtro-group">
      <label>Vendedor</label>
      <select id="sel-vend" onchange="rebuild()"><option value="__TODOS__">— Todos —</option></select>
    </div>
  </div>
</div>
<div class="kpi-row" id="kpi-row"></div>
<div class="charts-grid">
  <div class="chart-box">
    <h3>Facturación mensual</h3>
    <div class="sl">Categorías</div><div class="filter-chips" id="fc-cat-chips"></div>
    <div class="sl" style="margin-top:5px">Marcas <span style="font-weight:400;font-size:8px">(línea punteada)</span></div><div class="filter-chips" id="fc-marca-chips"></div>
    <div class="chart-wrap"><canvas id="ch-fact"></canvas></div>
  </div>
  <div class="chart-box">
    <h3>Unidades mensuales</h3>
    <div class="sl">Categorías</div><div class="filter-chips" id="uc-cat-chips"></div>
    <div class="sl" style="margin-top:5px">Marcas <span style="font-weight:400;font-size:8px">(línea punteada)</span></div><div class="filter-chips" id="uc-marca-chips"></div>
    <div class="chart-wrap"><canvas id="ch-uds"></canvas></div>
  </div>
</div>
<div class="card">
  <div class="tbl-header">
    <h3 id="tbl-title" style="margin:0">Ranking de vendedores</h3>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);font-weight:600">Mes:</label>
      <select id="sel-mes-tabla" onchange="buildTable()"></select>
    </div>
  </div>
  <div class="tbl-wrap"><table id="tbl-detalle"><tbody><tr><td class="empty">Seleccioná al menos una sucursal</td></tr></tbody></table></div>
</div>

  h+='<div class="kpi"><div class="val">'+fmtF(totU)+'</div><div class="lbl">Unidades neumáticos</div><div class="var '+(varU>=0?'pos':'neg')+'">'+fmtPct(varU)+' vs mes ant.</div></div>';
  h+='<div class="kpi"><div class="val">$'+fmt(promM)+'</div><div class="lbl">Promedio mensual</div></div>';
  h+='<div class="kpi"><div class="val">'+fmtF(Math.round(promU))+'</div><div class="lbl">Prom. uds/mes</div></div>';
  h+='<div class="kpi"><div class="val">$'+fmtF(Math.round(ticket))+'</div><div class="lbl">Ticket promedio</div><div class="lbl" style="font-size:8px;margin-top:1px">'+fmtF(totN)+' facturas</div></div>';
  h+='<div class="kpi"><div class="val" style="color:var(--verde)">'+fmtF(totR)+'</div><div class="lbl">Recapados (uds)</div></div>';
  if(varAA!==null)h+='<div class="kpi"><div class="val">$'+fmt(data[ult].ft)+'</div><div class="lbl">Último mes</div><div class="var '+(varAA>=0?'pos':'neg')+'">'+fmtPct(varAA)+' vs año ant.</div></div>';
  document.getElementById('kpi-row').innerHTML=h;
  var marcaTotals={};
  meses.forEach(function(m){Object.entries(data[m].fm||{}).forEach(function(e){marcaTotals[e[0]]=(marcaTotals[e[0]]||0)+e[1]})});
  _allMarcas=Object.entries(marcaTotals).sort(function(a,b){return b[1]-a[1]}).slice(0,12).map(function(e){return e[0]});
  _mcm={};_allMarcas.forEach(function(m,i){_mcm[m]=MP[i%MP.length]});
  if(activeFM.size===0)activeFM=new Set(_allMarcas);
  if(activeUM.size===0)activeUM=new Set(_allMarcas);
  activeFM=new Set(_allMarcas.filter(function(m){return activeFM.has(m)}));
  activeUM=new Set(_allMarcas.filter(function(m){return activeUM.has(m)}));
  buildSeriesChips('fc-cat-chips',CATS,CAT_COLORS,activeFC,'fc');
  buildSeriesChips('fc-marca-chips',_allMarcas,_mcm,activeFM,'fm');
  buildSeriesChips('uc-cat-chips',CATS,CAT_COLORS,activeUC,'uc');
  buildSeriesChips('uc-marca-chips',_allMarcas,_mcm,activeUM,'um');
  rebuildCharts();buildTable();
}
function rebuildCharts(){
  var data=getData();
  var meses=MESES.filter(function(m){return data[m].ft!==0||data[m].ut!==0});
  if(!meses.length)return;
  var labels=meses.map(mesLbl);
  var factDS=[];
  activeFC.forEach(function(c){factDS.push({label:c,data:meses.map(function(m){return Math.round(data[m].fc[c]||0)}),borderColor:CAT_COLORS[c]||'#999',backgroundColor:(CAT_COLORS[c]||'#999')+'22',fill:false,pointBackgroundColor:CAT_COLORS[c]||'#999'})});
  _allMarcas.filter(function(m){return activeFM.has(m)}).forEach(function(m){factDS.push({label:m,data:meses.map(function(me){return Math.round(data[me].fm[m]||0)}),borderColor:_mcm[m]||'#999',backgroundColor:(_mcm[m]||'#999')+'22',fill:false,pointBackgroundColor:_mcm[m]||'#999',borderDash:[5,3]})});
  mkLine('ch-fact',labels,factDS);
  var udsDS=[];
  activeUC.forEach(function(c){udsDS.push({label:c,data:meses.map(function(m){return Math.round(data[m].uc[c]||0)}),borderColor:CAT_COLORS[c]||'#999',backgroundColor:(CAT_COLORS[c]||'#999')+'22',fill:false,pointBackgroundColor:CAT_COLORS[c]||'#999'})});
  _allMarcas.filter(function(m){return activeUM.has(m)}).forEach(function(m){udsDS.push({label:m,data:meses.map(function(me){return Math.round(data[me].um[m]||0)}),borderColor:_mcm[m]||'#999',backgroundColor:(_mcm[m]||'#999')+'22',fill:false,pointBackgroundColor:_mcm[m]||'#999',borderDash:[5,3]})});
  mkLine('ch-uds',labels,udsDS,{yFmt:function(v){return fmtF(v)+' uds'}});
}
function buildTable(){
  var mes=document.getElementById('sel-mes-tabla').value;
  var tbl=document.getElementById('tbl-detalle');
  var title=document.getElementById('tbl-title');
  var vendSel=document.getElementById('sel-vend').value;
  if(vendSel!=='__TODOS__'){
    title.textContent='Detalle mensual — '+vendSel;
    var data=getData();
    var meses=MESES.filter(function(m){return data[m].ft!==0||data[m].ut!==0});
    var catCols=CATS.filter(function(c){return meses.some(function(m){return(data[m].uc[c]||0)>0})});
    var rows='',totF=0,totU=0,totR=0,totN=0,totCat={};
    catCols.forEach(function(c){totCat[c]=0});
    meses.forEach(function(m){
      var d=data[m];totF+=d.ft;totU+=d.ut;totR+=d.rc;totN+=d.nf;
      var cc=catCols.map(function(c){var v=Math.round(d.uc[c]||0);totCat[c]+=v;return'<td class="mono">'+(v||'—')+'</td>'}).join('');
      var tk=d.nf>0?Math.round(d.ft/d.nf):0;
      rows+='<tr><td style="font-weight:600">'+mesLbl(m)+'</td><td class="mono">$'+fmtF(Math.round(d.ft))+'</td><td class="mono">'+fmtF(Math.round(d.ut))+'</td>'+cc+'<td class="mono" style="color:var(--verde)">'+(d.rc||'—')+'</td><td class="mono">'+(d.nf||'—')+'</td><td class="mono">$'+(tk?fmtF(tk):'—')+'</td></tr>';
    });
    var totCC=catCols.map(function(c){return'<td class="mono" style="font-weight:700">'+(fmtF(totCat[c])||'—')+'</td>'}).join('');
    var totTk=totN>0?Math.round(totF/totN):0;
    var h='<thead><tr><th>Mes</th><th>Facturación</th><th>Uds Total</th>'+catCols.map(function(c){return'<th>'+c+'</th>'}).join('')+'<th>Recapados</th><th>Facturas</th><th>Ticket</th></tr></thead>';
    h+='<tbody>'+rows+'<tr style="background:rgba(192,57,43,.05);font-weight:700;border-top:2px solid var(--r)"><td>TOTAL</td><td class="mono">$'+fmtF(Math.round(totF))+'</td><td class="mono">'+fmtF(Math.round(totU))+'</td>'+totCC+'<td class="mono" style="color:var(--verde)">'+fmtF(totR)+'</td><td class="mono">'+fmtF(totN)+'</td><td class="mono">$'+(totTk?fmtF(totTk):'—')+'</td></tr></tbody>';
    tbl.innerHTML=h;return;
  }
  var periodoTxt=mes==='__TODO__'?'Todo el período':mesLbl(mes);
  title.textContent='Ranking de vendedores — '+periodoTxt;
  var vMap=getVendRanking(mes);
  if(!vMap||!Object.keys(vMap).length){tbl.innerHTML='<tbody><tr><td class="empty">Sin datos</td></tr></tbody>';return}
  var sorted=Object.entries(vMap).filter(function(e){return e[1].ft>0}).sort(function(a,b){return b[1].ft-a[1].ft});
  var totalG=sorted.reduce(function(s,e){return s+e[1].ft},0);
  var catCols=CATS.filter(function(c){return sorted.some(function(e){return(e[1].uc[c]||0)>0})});
  var marcaTot={};sorted.forEach(function(e){Object.entries(e[1].fm||{}).forEach(function(x){marcaTot[x[0]]=(marcaTot[x[0]]||0)+x[1]})});
  var topM=Object.entries(marcaTot).sort(function(a,b){return b[1]-a[1]}).slice(0,6).map(function(e){return e[0]});
  var rows='',gF=0,gU=0,gR=0,gN=0,gCat={},gMarca={};
  catCols.forEach(function(c){gCat[c]=0});topM.forEach(function(m){gMarca[m]=0});
  sorted.forEach(function(item,i){
    var nom=item[0],d=item[1];
    var pct=totalG>0?(d.ft/totalG*100).toFixed(1):0;
    var tk=d.nf>0?Math.round(d.ft/d.nf):0;
    gF+=d.ft;gU+=d.ut;gR+=d.rc;gN+=d.nf;
    var cc=catCols.map(function(c){var v=Math.round(d.uc[c]||0);gCat[c]+=v;return'<td class="mono">'+(v||'—')+'</td>'}).join('');
    var mc=topM.map(function(m){var v=Math.round(d.um[m]||0);gMarca[m]+=v;return'<td class="mono">'+(v||'—')+'</td>'}).join('');
    rows+='<tr><td class="rn '+(i<3?'top':'')+'">'+( i+1)+'</td><td><div style="font-weight:600;font-size:11px">'+nom+'</div></td><td class="mono" style="font-weight:600">$'+fmtF(Math.round(d.ft))+'</td><td class="mono">'+pct+'%</td><td class="mono">'+fmtF(Math.round(d.ut))+'</td>'+cc+'<td class="mono" style="color:var(--verde)">'+(d.rc||'—')+'</td>'+mc+'<td class="mono">'+(d.nf?fmtF(d.nf):'—')+'</td><td class="mono">$'+(tk?fmtF(tk):'—')+'</td></tr>';
  });
  var gTk=gN>0?Math.round(gF/gN):0;
  var gCC=catCols.map(function(c){return'<td class="mono" style="font-weight:700">'+(fmtF(gCat[c])||'—')+'</td>'}).join('');
  var gMC=topM.map(function(m){return'<td class="mono" style="font-weight:700">'+(fmtF(gMarca[m])||'—')+'</td>'}).join('');
  var h='<thead><tr><th>#</th><th>Vendedor</th><th>Facturación</th><th>%</th><th>Uds</th>'+catCols.map(function(c){return'<th>'+c+'</th>'}).join('')+'<th>Recap.</th>'+topM.map(function(m){return'<th style="color:var(--a)">'+m+'</th>'}).join('')+'<th>Facturas</th><th>Ticket</th></tr></thead>';
  h+='<tbody>'+rows+'<tr style="background:rgba(192,57,43,.05);font-weight:700;border-top:2px solid var(--r)"><td></td><td>TOTAL</td><td class="mono">$'+fmtF(Math.round(gF))+'</td><td class="mono">100%</td><td class="mono">'+fmtF(Math.round(gU))+'</td>'+gCC+'<td class="mono" style="color:var(--verde)">'+fmtF(gR)+'</td>'+gMC+'<td class="mono">'+fmtF(gN)+'</td><td class="mono">$'+(gTk?fmtF(gTk):'—')+'</td></tr></tbody>';
  tbl.innerHTML=h;
}
initChips();initMesSelect();updateVendSelect();rebuild();
</script>
