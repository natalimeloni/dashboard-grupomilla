<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Grupo Milla — Reporte de Vendedores</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');
:root{
  --n1:#1A1A1A;--n2:#2D2D2D;--n3:#555;--g1:#F2F2F2;--g2:#E8E8E8;--g3:#D0D0D0;
  --r:#C0392B;--v:#27AE60;--a:#2980B9;--am:#F39C12;--verde:#27AE60;
  --bg:#F7F7F7;--card:#fff;--txt:#1A1A1A;--txt2:#555;--brd:#E8E8E8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--txt);padding:24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--n1)}
.logo span{color:var(--r)}
.sub{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:2px}
.card{background:var(--card);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt2);margin-bottom:12px;font-weight:600}
.filtros{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start}
.filtro-group{flex:1;min-width:200px}
.filtro-group label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-bottom:6px;font-weight:600}
.suc-grid{display:flex;flex-wrap:wrap;gap:4px;max-height:180px;overflow-y:auto;padding:4px}
.suc-chip{padding:4px 10px;border-radius:6px;font-size:10px;cursor:pointer;border:1.5px solid var(--g2);background:var(--card);color:var(--n1);font-family:'Outfit',sans-serif;font-weight:500;transition:all .15s;user-select:none}
.suc-chip.active{background:var(--n1);color:#fff;border-color:var(--n1)}
.suc-chip:hover{border-color:var(--n3)}
select{padding:8px 12px;border:1.5px solid var(--g2);border-radius:8px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;background:var(--card);color:var(--n1);min-width:200px;cursor:pointer}
.btn-todos{padding:4px 10px;border-radius:6px;font-size:10px;cursor:pointer;border:1.5px solid var(--r);background:var(--r);color:#fff;font-family:'Outfit',sans-serif;font-weight:600;margin-right:4px}
.btn-ninguno{padding:4px 10px;border-radius:6px;font-size:10px;cursor:pointer;border:1.5px solid var(--g3);background:var(--card);color:var(--n3);font-family:'Outfit',sans-serif;font-weight:500}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border-radius:10px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.kpi .val{font-size:22px;font-weight:700;color:var(--n1)}
.kpi .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-top:2px}
.kpi .var{font-size:11px;font-weight:600;margin-top:4px}
.var.pos{color:var(--v)}.var.neg{color:var(--r)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
.chart-box{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-box h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-bottom:10px;font-weight:600}
.chart-wrap{position:relative;height:320px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--g1);padding:8px 6px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--n3);border-bottom:2px solid var(--g2);white-space:nowrap}
td{padding:7px 6px;border-bottom:1px solid var(--g1);white-space:nowrap}
.mono{font-variant-numeric:tabular-nums;text-align:right}
tr:hover{background:rgba(0,0,0,.02)}
.top{font-weight:700}
.rn{text-align:center;color:var(--n3);font-size:10px;width:24px}
.empty{text-align:center;padding:40px;color:var(--n3);font-size:13px}
.periodo-info{font-size:11px;color:var(--txt2);margin-bottom:8px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">GRUPO <span>MILLA</span></div>
    <div class="sub">Reporte de Vendedores — Historial Completo</div>
  </div>
  <div id="periodo-txt" class="periodo-info"></div>
</div>

<!-- FILTROS -->
<div class="card">
  <h3>Filtros</h3>
  <div class="filtros">
    <div class="filtro-group" style="flex:2">
      <label>Sucursales</label>
      <div style="margin-bottom:6px">
        <button class="btn-todos" onclick="selTodas()">Todas</button>
        <button class="btn-ninguno" onclick="selNinguna()">Ninguna</button>
      </div>
      <div class="suc-grid" id="suc-chips"></div>
    </div>
    <div class="filtro-group">
      <label>Vendedor</label>
      <select id="sel-vend" onchange="rebuild()"><option value="__TODOS__">— Todos los vendedores —</option></select>
    </div>
  </div>
</div>

<!-- KPIs -->
<div class="kpi-row" id="kpi-row"></div>

<!-- GRÁFICOS -->
<div class="charts-grid">
  <div class="chart-box"><h3>Facturación mensual por categoría</h3><div class="chart-wrap"><canvas id="ch-fact-cat"></canvas></div></div>
  <div class="chart-box"><h3>Facturación mensual por marca</h3><div class="chart-wrap"><canvas id="ch-fact-marca"></canvas></div></div>
  <div class="chart-box"><h3>Unidades mensuales por categoría</h3><div class="chart-wrap"><canvas id="ch-uds-cat"></canvas></div></div>
  <div class="chart-box"><h3>Unidades mensuales por marca</h3><div class="chart-wrap"><canvas id="ch-uds-marca"></canvas></div></div>
</div>

<!-- TABLA DETALLE -->
<div class="card">
  <h3 id="tbl-title">Detalle mensual</h3>
  <div class="tbl-wrap">
    <table id="tbl-detalle"><tbody><tr><td class="empty">Seleccioná al menos una sucursal</td></tr></tbody></table>
  </div>
</div>

const _bin = Uint8Array.from(atob(_raw), c=>c.charCodeAt(0));
const D = JSON.parse(new TextDecoder().decode(pako.inflate(_bin)));

const CATS = D.categorias;
const MESES = D.meses;
const SUCS = Object.keys(D.sucursales).sort();

// Colores por categoría
const CAT_COLORS = {
  'Auto':'#3498DB','Camioneta':'#E67E22','Camión':'#E74C3C','Agr. Delantera':'#27AE60',
  'Agr. Trasera':'#2ECC71','Agr. Radial':'#1ABC9C','Viales':'#9B59B6',
  'Industriales':'#F39C12','Minería':'#34495E','Recapados':'#16A085'
};
// Colores para marcas (paleta extendida)
const MARCA_PALETTE = ['#C0392B','#2980B9','#27AE60','#F39C12','#8E44AD','#E67E22',
  '#1ABC9C','#D35400','#2C3E50','#7F8C8D','#E74C3C','#3498DB','#2ECC71','#9B59B6',
  '#F1C40F','#16A085','#C0392B','#34495E','#95A5A6','#BDC3C7'];

let activeSucs = new Set(SUCS);
let charts = {};

// ══ INIT CHIPS ══
function initChips(){
  const cont = document.getElementById('suc-chips');
  cont.innerHTML = SUCS.map(s=>`<span class="suc-chip active" data-suc="${s}" onclick="toggleSuc(this)">${s}</span>`).join('');
}
function toggleSuc(el){
  const s = el.dataset.suc;
  if(activeSucs.has(s)){ activeSucs.delete(s); el.classList.remove('active'); }
  else{ activeSucs.add(s); el.classList.add('active'); }
  updateVendSelect();
  rebuild();
}
function selTodas(){
  activeSucs = new Set(SUCS);
  document.querySelectorAll('.suc-chip').forEach(e=>e.classList.add('active'));
  updateVendSelect(); rebuild();
}
function selNinguna(){
  activeSucs.clear();
  document.querySelectorAll('.suc-chip').forEach(e=>e.classList.remove('active'));
  updateVendSelect(); rebuild();
}

// ══ VENDEDOR SELECT ══
function updateVendSelect(){
  const sel = document.getElementById('sel-vend');
  const prevVal = sel.value;
  const vends = new Set();
  for(const suc of activeSucs){
    if(D.sucursales[suc]) for(const v of Object.keys(D.sucursales[suc])) vends.add(v);
  }
  const sorted = [...vends].sort();
  sel.innerHTML = '<option value="__TODOS__">— Todos los vendedores —</option>' +
    sorted.map(v=>`<option value="${v}">${v}</option>`).join('');
  if(sorted.includes(prevVal)) sel.value = prevVal;
  else sel.value = '__TODOS__';
}

// ══ AGGREGAR DATOS ══
function getData(){
  // Agregar datos según filtros activos
  const vendSel = document.getElementById('sel-vend').value;
  const result = {}; // mes → {ft, ut, fc:{}, uc:{}, fm:{}, um:{}, rc, nf}
  for(const mes of MESES) result[mes] = {ft:0,ut:0,fc:{},uc:{},fm:{},um:{},rc:0,nf:0};

  for(const suc of activeSucs){
    const vends = D.sucursales[suc];
    if(!vends) continue;
    for(const [v, meses] of Object.entries(vends)){
      if(vendSel !== '__TODOS__' && v !== vendSel) continue;
      for(const [m, d] of Object.entries(meses)){
        if(!result[m]) continue;
        result[m].ft += d.ft;
        result[m].ut += d.ut;
        result[m].rc += d.rc;
        result[m].nf += d.nf;
        for(const [k,v2] of Object.entries(d.fc||{})) result[m].fc[k] = (result[m].fc[k]||0)+v2;
        for(const [k,v2] of Object.entries(d.uc||{})) result[m].uc[k] = (result[m].uc[k]||0)+v2;
        for(const [k,v2] of Object.entries(d.fm||{})) result[m].fm[k] = (result[m].fm[k]||0)+v2;
        for(const [k,v2] of Object.entries(d.um||{})) result[m].um[k] = (result[m].um[k]||0)+v2;
      }
    }
  }
  return result;
}

// Per-vendedor breakdown for table
function getVendData(){
  const vendSel = document.getElementById('sel-vend').value;
  if(vendSel !== '__TODOS__'){
    // Single vendedor → return monthly data
    return null; // handled differently
  }
  // All vendedores → aggregate per vendedor
  const vMap = {};
  for(const suc of activeSucs){
    const vends = D.sucursales[suc];
    if(!vends) continue;
    for(const [v, meses] of Object.entries(vends)){
      if(!vMap[v]) vMap[v] = {ft:0,ut:0,rc:0,nf:0,fc:{},uc:{}};
      for(const d of Object.values(meses)){
        vMap[v].ft += d.ft;
        vMap[v].ut += d.ut;
        vMap[v].rc += d.rc;
        vMap[v].nf += d.nf;
        for(const [k,v2] of Object.entries(d.fc||{})) vMap[v].fc[k]=(vMap[v].fc[k]||0)+v2;
        for(const [k,v2] of Object.entries(d.uc||{})) vMap[v].uc[k]=(vMap[v].uc[k]||0)+v2;
      }
    }
  }
  return vMap;
}

// ══ FORMATEO ══
function fmt(n){ return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'k':Math.round(n).toLocaleString('es-AR') }
function fmtFull(n){ return Math.round(n).toLocaleString('es-AR') }
function fmtPct(n){ return (n>=0?'+':'')+n.toFixed(1)+'%' }
function mesLabel(m){ const mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; const [y,mo]=m.split('-'); return mn[+mo-1]+' '+y.slice(2) }

// ══ CHARTS ══
function mkChart(id, type, labels, datasets, opts={}){
  if(charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id);
  if(!ctx) return;
  charts[id] = new Chart(ctx, {
    type, data:{labels, datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true, position:'bottom', labels:{boxWidth:10,font:{size:9,family:'Outfit'},padding:6}},
        tooltip:{
          backgroundColor:'rgba(26,26,26,.92)', titleFont:{size:11,family:'Outfit'},
          bodyFont:{size:11,family:'Outfit'}, padding:10, cornerRadius:8,
          callbacks:{
            label: c => {
              const v = c.raw||0;
              return c.dataset.label+': '+(opts.yFmt?opts.yFmt(v):('$'+fmtFull(v)));
            }
          }
        }
      },
      scales:{
        x:{ticks:{font:{size:9,family:'Outfit'},maxRotation:45},grid:{display:false}},
        y:{
          ticks:{font:{size:9,family:'Outfit'},callback:v=>opts.yFmt?opts.yFmt(v):('$'+fmt(v))},
          grid:{color:'rgba(0,0,0,.04)'},
          stacked: opts.stacked||false
        },
        ...(opts.stacked?{x:{stacked:true,ticks:{font:{size:9,family:'Outfit'},maxRotation:45},grid:{display:false}}}:{})
      },
      interaction:{mode:'index',intersect:false}
    }
  });
}

// ══ REBUILD ══
function rebuild(){
  const data = getData();
  const meses = MESES.filter(m=> data[m] && data[m].ft !== 0 || data[m].ut !== 0);
  if(meses.length === 0){
    document.getElementById('kpi-row').innerHTML = '';
    ['ch-fact-cat','ch-fact-marca','ch-uds-cat','ch-uds-marca'].forEach(id=>{if(charts[id])charts[id].destroy()});
    document.getElementById('tbl-detalle').innerHTML = '<tbody><tr><td class="empty">Sin datos para la selección actual</td></tr></tbody>';
    return;
  }

  // Período
  document.getElementById('periodo-txt').textContent = `${mesLabel(meses[0])} — ${mesLabel(meses[meses.length-1])} (${meses.length} meses)`;
  const labels = meses.map(mesLabel);

  // ── KPIs ──
  const totFact = meses.reduce((s,m)=>s+data[m].ft, 0);
  const totUds  = meses.reduce((s,m)=>s+data[m].ut, 0);
  const totRecap= meses.reduce((s,m)=>s+data[m].rc, 0);
  const totNf   = meses.reduce((s,m)=>s+data[m].nf, 0);
  const promMes = totFact / meses.length;
  const promUds = totUds / meses.length;
  const ticket  = totNf>0 ? totFact/totNf : 0;

  // Var último mes vs anterior
  const ult = meses[meses.length-1];
  const penult = meses.length>1 ? meses[meses.length-2] : null;
  const varFact = penult && data[penult].ft>0 ? ((data[ult].ft-data[penult].ft)/data[penult].ft*100) : 0;
  const varUds  = penult && data[penult].ut>0 ? ((data[ult].ut-data[penult].ut)/data[penult].ut*100) : 0;

  // Var interanual último mes
  const ultY = parseInt(ult.slice(0,4));
  const ultM = ult.slice(5);
  const mesAA = (ultY-1)+'-'+ultM;
  const factAA = data[mesAA]?.ft || 0;
  const varAA = factAA>0 ? ((data[ult].ft-factAA)/factAA*100) : null;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi"><div class="val">$${fmt(totFact)}</div><div class="lbl">Facturación total</div>
      <div class="var ${varFact>=0?'pos':'neg'}">${fmtPct(varFact)} vs mes ant.</div></div>
    <div class="kpi"><div class="val">${fmtFull(totUds)}</div><div class="lbl">Unidades neumáticos</div>
      <div class="var ${varUds>=0?'pos':'neg'}">${fmtPct(varUds)} vs mes ant.</div></div>
    <div class="kpi"><div class="val">$${fmt(promMes)}</div><div class="lbl">Promedio mensual</div></div>
    <div class="kpi"><div class="val">${fmtFull(Math.round(promUds))}</div><div class="lbl">Prom. uds/mes</div></div>
    <div class="kpi"><div class="val">$${fmtFull(Math.round(ticket))}</div><div class="lbl">Ticket promedio</div>
      <div class="lbl" style="font-size:9px;margin-top:2px">${fmtFull(totNf)} facturas</div></div>
    <div class="kpi"><div class="val" style="color:var(--verde)">${fmtFull(totRecap)}</div><div class="lbl">Recapados (uds)</div></div>
    ${varAA!==null?`<div class="kpi"><div class="val">$${fmt(data[ult].ft)}</div><div class="lbl">Último mes</div>
      <div class="var ${varAA>=0?'pos':'neg'}">${fmtPct(varAA)} vs año ant.</div></div>`:''}
  `;

  // ── CHART: Facturación por categoría (stacked bar) ──
  const catDS = CATS.filter(c=> meses.some(m=> (data[m].fc[c]||0)>0)).map(c=>({
    label:c, data:meses.map(m=>Math.round(data[m].fc[c]||0)),
    backgroundColor: CAT_COLORS[c]||'#999', borderRadius:2
  }));
  mkChart('ch-fact-cat','bar',labels,catDS,{stacked:true});

  // ── CHART: Facturación por marca (stacked bar) ──
  const allMarcas = {};
  meses.forEach(m=>{ for(const [k,v] of Object.entries(data[m].fm||{})) allMarcas[k]=(allMarcas[k]||0)+v; });
  const topMarcas = Object.entries(allMarcas).sort((a,b)=>b[1]-a[1]).slice(0,10).map(e=>e[0]);
  const marcaDS = topMarcas.map((marca,i)=>({
    label:marca, data:meses.map(m=>Math.round(data[m].fm[marca]||0)),
    backgroundColor: MARCA_PALETTE[i%MARCA_PALETTE.length], borderRadius:2
  }));
  mkChart('ch-fact-marca','bar',labels,marcaDS,{stacked:true});

  // ── CHART: Unidades por categoría (stacked bar) ──
  const catUdsDS = CATS.filter(c=> meses.some(m=> (data[m].uc[c]||0)>0)).map(c=>({
    label:c, data:meses.map(m=>Math.round(data[m].uc[c]||0)),
    backgroundColor: CAT_COLORS[c]||'#999', borderRadius:2
  }));
  mkChart('ch-uds-cat','bar',labels,catUdsDS,{stacked:true, yFmt:v=>fmtFull(v)+' uds'});

  // ── CHART: Unidades por marca (stacked bar) ──
  const allMarcasU = {};
  meses.forEach(m=>{ for(const [k,v] of Object.entries(data[m].um||{})) allMarcasU[k]=(allMarcasU[k]||0)+v; });
  const topMarcasU = Object.entries(allMarcasU).sort((a,b)=>b[1]-a[1]).slice(0,10).map(e=>e[0]);
  const marcaUdsDS = topMarcasU.map((marca,i)=>({
    label:marca, data:meses.map(m=>Math.round(data[m].um[marca]||0)),
    backgroundColor: MARCA_PALETTE[i%MARCA_PALETTE.length], borderRadius:2
  }));
  mkChart('ch-uds-marca','bar',labels,marcaUdsDS,{stacked:true, yFmt:v=>fmtFull(v)+' uds'});

  // ── TABLA DETALLE ──
  buildTable(data, meses);
}

function buildTable(data, meses){
  const vendSel = document.getElementById('sel-vend').value;
  const tbl = document.getElementById('tbl-detalle');
  const title = document.getElementById('tbl-title');

  if(vendSel !== '__TODOS__'){
    // Detalle mensual de UN vendedor
    title.textContent = `Detalle mensual — ${vendSel}`;
    const catCols = CATS.filter(c=> meses.some(m=> (data[m].uc[c]||0)>0));
    let rows = '';
    let totF=0,totU=0,totR=0,totN=0;
    const totCat = {};
    catCols.forEach(c=>totCat[c]=0);

    meses.forEach(m=>{
      const d = data[m];
      totF+=d.ft; totU+=d.ut; totR+=d.rc; totN+=d.nf;
      const catCells = catCols.map(c=>{
        const v=Math.round(d.uc[c]||0); totCat[c]+=v;
        return `<td class="mono">${v||'—'}</td>`;
      }).join('');
      const tick = d.nf>0 ? Math.round(d.ft/d.nf) : 0;
      rows+=`<tr>
        <td style="font-weight:600">${mesLabel(m)}</td>
        <td class="mono">$${fmtFull(Math.round(d.ft))}</td>
        <td class="mono">${fmtFull(Math.round(d.ut))}</td>
        ${catCells}
        <td class="mono" style="color:var(--verde)">${d.rc||'—'}</td>
        <td class="mono">${d.nf||'—'}</td>
        <td class="mono">$${tick?fmtFull(tick):'—'}</td>
      </tr>`;
    });
    const totCatCells = catCols.map(c=>`<td class="mono" style="font-weight:700">${fmtFull(totCat[c])||'—'}</td>`).join('');
    const totTick = totN>0?Math.round(totF/totN):0;
    tbl.innerHTML = `<thead><tr>
      <th>Mes</th><th>Facturación</th><th>Uds Total</th>
      ${catCols.map(c=>`<th>${c}</th>`).join('')}
      <th>Recapados</th><th>Facturas</th><th>Ticket</th>
    </tr></thead><tbody>${rows}
    <tr style="background:rgba(192,57,43,.05);font-weight:700;border-top:2px solid var(--r)">
      <td>TOTAL</td><td class="mono">$${fmtFull(Math.round(totF))}</td>
      <td class="mono">${fmtFull(Math.round(totU))}</td>${totCatCells}
      <td class="mono" style="color:var(--verde)">${fmtFull(totR)}</td>
      <td class="mono">${fmtFull(totN)}</td>
      <td class="mono">$${totTick?fmtFull(totTick):'—'}</td>
    </tr></tbody>`;
  } else {
    // Ranking de vendedores
    title.textContent = 'Ranking de vendedores — Período completo';
    const vMap = getVendData();
    if(!vMap || Object.keys(vMap).length===0){
      tbl.innerHTML='<tbody><tr><td class="empty">Sin datos</td></tr></tbody>';
      return;
    }
    const sorted = Object.entries(vMap).sort((a,b)=>b[1].ft-a[1].ft);
    const totalGlobal = sorted.reduce((s,e)=>s+e[1].ft, 0);
    const catCols = CATS.filter(c=> sorted.some(([,d])=> (d.uc[c]||0)>0));
    let rows='';
    let gTotF=0,gTotU=0,gTotR=0,gTotN=0;
    const gTotCat={};
    catCols.forEach(c=>gTotCat[c]=0);

    sorted.forEach(([nombre,d],i)=>{
      const pct = totalGlobal>0 ? (d.ft/totalGlobal*100).toFixed(1) : 0;
      const tick = d.nf>0 ? Math.round(d.ft/d.nf) : 0;
      gTotF+=d.ft; gTotU+=d.ut; gTotR+=d.rc; gTotN+=d.nf;
      const catCells = catCols.map(c=>{
        const v=Math.round(d.uc[c]||0); gTotCat[c]+=v;
        return `<td class="mono">${v||'—'}</td>`;
      }).join('');
      rows+=`<tr>
        <td class="rn ${i<3?'top':''}">${i+1}</td>
        <td><div style="font-weight:600;font-size:11px">${nombre}</div></td>
        <td class="mono" style="font-weight:600">$${fmtFull(Math.round(d.ft))}</td>
        <td class="mono">${pct}%</td>
        <td class="mono">${fmtFull(Math.round(d.ut))}</td>
        ${catCells}
        <td class="mono" style="color:var(--verde)">${d.rc||'—'}</td>
        <td class="mono">${d.nf?fmtFull(d.nf):'—'}</td>
        <td class="mono">$${tick?fmtFull(tick):'—'}</td>
      </tr>`;
    });
    const gTick = gTotN>0?Math.round(gTotF/gTotN):0;
    const gTotCatCells = catCols.map(c=>`<td class="mono" style="font-weight:700">${fmtFull(gTotCat[c])||'—'}</td>`).join('');
    tbl.innerHTML=`<thead><tr>
      <th>#</th><th>Vendedor</th><th>Facturación</th><th>%</th><th>Uds Total</th>
      ${catCols.map(c=>`<th>${c}</th>`).join('')}
      <th>Recapados</th><th>Facturas</th><th>Ticket</th>
    </tr></thead><tbody>${rows}
    <tr style="background:rgba(192,57,43,.05);font-weight:700;border-top:2px solid var(--r)">
      <td></td><td>TOTAL</td>
      <td class="mono">$${fmtFull(Math.round(gTotF))}</td><td class="mono">100%</td>
      <td class="mono">${fmtFull(Math.round(gTotU))}</td>${gTotCatCells}
      <td class="mono" style="color:var(--verde)">${fmtFull(gTotR)}</td>
      <td class="mono">${fmtFull(gTotN)}</td>
      <td class="mono">$${gTick?fmtFull(gTick):'—'}</td>
    </tr></tbody>`;
  }
}

// ══ INIT ══
initChips();
updateVendSelect();
rebuild();
</script>
