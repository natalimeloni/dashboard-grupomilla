<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Grupo Milla — Reporte de Vendedores</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap');
:root{
  --n1:#1A1A1A;--n2:#2D2D2D;--n3:#555;--g1:#F2F2F2;--g2:#E8E8E8;--g3:#D0D0D0;
  --r:#C0392B;--v:#27AE60;--a:#2980B9;--am:#F39C12;--verde:#27AE60;
  --bg:#F7F7F7;--card:#fff;--txt:#1A1A1A;--txt2:#555;--brd:#E8E8E8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--txt);padding:20px 24px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--n1)}
.logo span{color:var(--r)}
.sub{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:2px}
.card{background:var(--card);border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
.card h3{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt2);margin-bottom:10px;font-weight:600}
.filtros{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.filtro-group{min-width:140px}
.filtro-group label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-bottom:5px;font-weight:600}
.suc-grid{display:flex;flex-wrap:wrap;gap:3px;max-height:140px;overflow-y:auto;padding:2px}
.chip{padding:3px 9px;border-radius:5px;font-size:10px;cursor:pointer;border:1.5px solid var(--g2);background:var(--card);color:var(--n1);font-family:'Outfit',sans-serif;font-weight:500;transition:all .15s;user-select:none}
.chip.active{background:var(--n1);color:#fff;border-color:var(--n1)}
.chip:hover{border-color:var(--n3)}
.chip.cat-chip.active{color:#fff}
select{padding:7px 10px;border:1.5px solid var(--g2);border-radius:7px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;background:var(--card);color:var(--n1);min-width:160px;cursor:pointer}
.btn-sm{padding:3px 9px;border-radius:5px;font-size:9px;cursor:pointer;border:1.5px solid var(--g3);background:var(--card);color:var(--n3);font-family:'Outfit',sans-serif;font-weight:600;margin-right:3px}
.btn-sm.primary{border-color:var(--r);background:var(--r);color:#fff}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border-radius:10px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.kpi .val{font-size:20px;font-weight:700;color:var(--n1)}
.kpi .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-top:2px}
.kpi .var{font-size:10px;font-weight:600;margin-top:3px}
.var.pos{color:var(--v)}.var.neg{color:var(--r)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
.chart-box{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-box h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-bottom:8px;font-weight:600}
.chart-wrap{position:relative;height:300px}
.filter-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--g1);padding:7px 6px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--n3);border-bottom:2px solid var(--g2);white-space:nowrap}
td{padding:6px;border-bottom:1px solid var(--g1);white-space:nowrap}
.mono{font-variant-numeric:tabular-nums;text-align:right}
tr:hover{background:rgba(0,0,0,.02)}
.top{font-weight:700}
.rn{text-align:center;color:var(--n3);font-size:10px;width:24px}
.empty{text-align:center;padding:40px;color:var(--n3);font-size:13px}
.tbl-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">GRUPO <span>MILLA</span></div>
    <div class="sub">Reporte de Vendedores</div>
  </div>
  <div id="periodo-txt" style="font-size:11px;color:var(--txt2)"></div>
</div>

<!-- FILTROS PRINCIPALES -->
<div class="card">
  <div class="filtros">
    <div class="filtro-group" style="flex:2;min-width:240px">
      <label>Sucursales</label>
      <div style="margin-bottom:4px">
        <button class="btn-sm primary" onclick="selTodas()">Todas</button>
        <button class="btn-sm" onclick="selNinguna()">Ninguna</button>
      </div>
      <div class="suc-grid" id="suc-chips"></div>
    </div>
    <div class="filtro-group">
      <label>Vendedor</label>
      <select id="sel-vend" onchange="rebuild()"><option value="__TODOS__">— Todos —</option></select>
    </div>
  </div>
</div>

<!-- KPIs -->
<div class="kpi-row" id="kpi-row"></div>

<!-- GRÁFICOS -->
<div class="charts-grid">
  <div class="chart-box">
    <h3>Facturación mensual por categoría</h3>
    <div class="filter-chips" id="fc-cat-chips"></div>
    <div class="chart-wrap"><canvas id="ch-fact-cat"></canvas></div>
  </div>
  <div class="chart-box">
    <h3>Facturación mensual por marca</h3>
    <div class="filter-chips" id="fc-marca-chips"></div>
    <div class="chart-wrap"><canvas id="ch-fact-marca"></canvas></div>
  </div>
  <div class="chart-box">
    <h3>Unidades mensuales por categoría</h3>
    <div class="filter-chips" id="uc-cat-chips"></div>
    <div class="chart-wrap"><canvas id="ch-uds-cat"></canvas></div>
  </div>
  <div class="chart-box">
    <h3>Unidades mensuales por marca</h3>
    <div class="filter-chips" id="uc-marca-chips"></div>
    <div class="chart-wrap"><canvas id="ch-uds-marca"></canvas></div>
  </div>
</div>

<!-- TABLA -->
<div class="card">
  <div class="tbl-header">
    <h3 id="tbl-title" style="margin:0">Ranking de vendedores</h3>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);font-weight:600">Mes:</label>
      <select id="sel-mes-tabla" onchange="buildTable()"></select>
    </div>
  </div>
  <div class="tbl-wrap">
    <table id="tbl-detalle"><tbody><tr><td class="empty">Seleccioná al menos una sucursal</td></tr></tbody></table>
  </div>
</div>

const _bin = Uint8Array.from(atob(_raw), c=>c.charCodeAt(0));
const D = JSON.parse(new TextDecoder().decode(pako.inflate(_bin)));

const CATS = D.categorias;
const MESES = D.meses;
const SUCS = Object.keys(D.sucursales).sort();

// Colores
const CAT_COLORS = {
  'Auto':'#3498DB','Camioneta':'#E67E22','Camión':'#E74C3C','Agr. Delantera':'#27AE60',
  'Agr. Trasera':'#2ECC71','Agr. Radial':'#1ABC9C','Viales':'#9B59B6',
  'Industriales':'#F39C12','Minería':'#34495E','Recapados':'#16A085'
};
const MARCA_PALETTE = ['#C0392B','#2980B9','#27AE60','#F39C12','#8E44AD','#E67E22',
  '#1ABC9C','#D35400','#2C3E50','#7F8C8D','#E74C3C','#3498DB','#2ECC71','#9B59B6',
  '#F1C40F','#16A085','#34495E','#95A5A6'];

let activeSucs = new Set(SUCS);
let charts = {};

// Track which series are active per chart
let activeFC = new Set(CATS);     // fact × cat
let activeFM = new Set();         // fact × marca (populated dynamically)
let activeUC = new Set(CATS);     // uds × cat
let activeUM = new Set();         // uds × marca

// ══ SUCURSAL CHIPS ══
function initChips(){
  document.getElementById('suc-chips').innerHTML = SUCS.map(s=>
    `<span class="chip active" data-suc="${s}" onclick="toggleSuc(this)">${s}</span>`
  ).join('');
}
function toggleSuc(el){
  const s=el.dataset.suc;
  if(activeSucs.has(s)){activeSucs.delete(s);el.classList.remove('active')}
  else{activeSucs.add(s);el.classList.add('active')}
  updateVendSelect(); rebuild();
}
function selTodas(){
  activeSucs=new Set(SUCS);
  document.querySelectorAll('[data-suc]').forEach(e=>e.classList.add('active'));
  updateVendSelect(); rebuild();
}
function selNinguna(){
  activeSucs.clear();
  document.querySelectorAll('[data-suc]').forEach(e=>e.classList.remove('active'));
  updateVendSelect(); rebuild();
}

// ══ VENDEDOR SELECT ══
function updateVendSelect(){
  const sel=document.getElementById('sel-vend');
  const prev=sel.value;
  const vs=new Set();
  for(const suc of activeSucs)
    if(D.sucursales[suc]) for(const v of Object.keys(D.sucursales[suc])) vs.add(v);
  const sorted=[...vs].sort();
  sel.innerHTML='<option value="__TODOS__">— Todos —</option>'+sorted.map(v=>`<option value="${v}">${v}</option>`).join('');
  sel.value=sorted.includes(prev)?prev:'__TODOS__';
}

// ══ AGGREGATE DATA ══
function getData(){
  const vendSel=document.getElementById('sel-vend').value;
  const r={};
  for(const m of MESES) r[m]={ft:0,ut:0,fc:{},uc:{},fm:{},um:{},rc:0,nf:0};
  for(const suc of activeSucs){
    const vends=D.sucursales[suc]; if(!vends) continue;
    for(const [v,meses] of Object.entries(vends)){
      if(vendSel!=='__TODOS__'&&v!==vendSel) continue;
      for(const [m,d] of Object.entries(meses)){
        if(!r[m]) continue;
        r[m].ft+=d.ft; r[m].ut+=d.ut; r[m].rc+=d.rc; r[m].nf+=d.nf;
        for(const [k,v2] of Object.entries(d.fc||{})) r[m].fc[k]=(r[m].fc[k]||0)+v2;
        for(const [k,v2] of Object.entries(d.uc||{})) r[m].uc[k]=(r[m].uc[k]||0)+v2;
        for(const [k,v2] of Object.entries(d.fm||{})) r[m].fm[k]=(r[m].fm[k]||0)+v2;
        for(const [k,v2] of Object.entries(d.um||{})) r[m].um[k]=(r[m].um[k]||0)+v2;
      }
    }
  }
  return r;
}

// Get vendedor ranking for a specific month or all
function getVendRanking(mes){
  const vendSel=document.getElementById('sel-vend').value;
  const vMap={};
  for(const suc of activeSucs){
    const vends=D.sucursales[suc]; if(!vends) continue;
    for(const [v,meses] of Object.entries(vends)){
      if(vendSel!=='__TODOS__'&&v!==vendSel) continue;
      if(!vMap[v]) vMap[v]={ft:0,ut:0,rc:0,nf:0,fc:{},uc:{},fm:{},um:{}};
      const entries = mes==='__TODO__' ? Object.entries(meses) : (meses[mes]?[[mes,meses[mes]]]:[]);
      for(const [,d] of entries){
        vMap[v].ft+=d.ft; vMap[v].ut+=d.ut; vMap[v].rc+=d.rc; vMap[v].nf+=d.nf;
        for(const [k,v2] of Object.entries(d.fc||{})) vMap[v].fc[k]=(vMap[v].fc[k]||0)+v2;
        for(const [k,v2] of Object.entries(d.uc||{})) vMap[v].uc[k]=(vMap[v].uc[k]||0)+v2;
        for(const [k,v2] of Object.entries(d.fm||{})) vMap[v].fm[k]=(vMap[v].fm[k]||0)+v2;
        for(const [k,v2] of Object.entries(d.um||{})) vMap[v].um[k]=(vMap[v].um[k]||0)+v2;
      }
    }
  }
  return vMap;
}

// ══ FORMAT ══
function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'k':Math.round(n).toLocaleString('es-AR')}
function fmtF(n){return Math.round(n).toLocaleString('es-AR')}
function fmtPct(n){return(n>=0?'+':'')+n.toFixed(1)+'%'}
function mesLbl(m){const mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];const[y,mo]=m.split('-');return mn[+mo-1]+' '+y.slice(2)}

// ══ CHART BUILDER ══
function mkLine(id, labels, datasets, opts={}){
  if(charts[id]) charts[id].destroy();
  const ctx=document.getElementById(id); if(!ctx) return;
  charts[id]=new Chart(ctx,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(26,26,26,.92)',titleFont:{size:11,family:'Outfit'},
          bodyFont:{size:11,family:'Outfit'},padding:10,cornerRadius:8,
          callbacks:{label:c=>{
            const v=c.raw||0;
            return c.dataset.label+': '+(opts.yFmt?opts.yFmt(v):('$ '+fmtF(v)));
          }}
        }
      },
      scales:{
        x:{ticks:{font:{size:9,family:'Outfit'},maxRotation:45},grid:{display:false}},
        y:{ticks:{font:{size:9,family:'Outfit'},callback:v=>opts.yFmt?opts.yFmt(v):('$'+fmt(v))},grid:{color:'rgba(0,0,0,.04)'},beginAtZero:true}
      },
      interaction:{mode:'index',intersect:false},
      elements:{point:{radius:3,hoverRadius:5},line:{tension:.3,borderWidth:2.5}}
    }
  });
}

// ══ SERIES CHIP BUILDERS ══
function buildSeriesChips(containerId, items, colorMap, activeSet, chartId, rebuildFn){
  const cont=document.getElementById(containerId);
  cont.innerHTML=items.map(item=>{
    const col=colorMap[item]||'#999';
    const isActive=activeSet.has(item);
    return `<span class="chip cat-chip ${isActive?'active':''}"
      style="${isActive?'background:'+col+';border-color:'+col:'border-color:'+col+';color:'+col}"
      data-key="${item}" data-color="${col}"
      onclick="toggleSeries(this,'${chartId}')">${item}</span>`;
  }).join('');
}

function toggleSeries(el, chartId){
  const key=el.dataset.key;
  const col=el.dataset.color;
  let activeSet;
  if(chartId==='ch-fact-cat') activeSet=activeFC;
  else if(chartId==='ch-fact-marca') activeSet=activeFM;
  else if(chartId==='ch-uds-cat') activeSet=activeUC;
  else activeSet=activeUM;

  if(activeSet.has(key)){activeSet.delete(key);el.classList.remove('active');el.style.background='';el.style.color=col}
  else{activeSet.add(key);el.classList.add('active');el.style.background=col;el.style.borderColor=col;el.style.color='#fff'}
  rebuildCharts();
}

// ══ MES SELECTOR FOR TABLE ══
function initMesSelect(){
  const sel=document.getElementById('sel-mes-tabla');
  sel.innerHTML='<option value="__TODO__">Todo el período</option>'+
    [...MESES].reverse().map(m=>`<option value="${m}">${mesLbl(m)}</option>`).join('');
}

// ══ MAIN REBUILD ══
let _allMarcas=[];
let _marcaColorMap={};

function rebuild(){
  const data=getData();
  const meses=MESES.filter(m=>data[m].ft!==0||data[m].ut!==0);
  if(!meses.length){
    document.getElementById('kpi-row').innerHTML='';
    ['ch-fact-cat','ch-fact-marca','ch-uds-cat','ch-uds-marca'].forEach(id=>{if(charts[id])charts[id].destroy()});
    document.getElementById('tbl-detalle').innerHTML='<tbody><tr><td class="empty">Sin datos para la selección</td></tr></tbody>';
    return;
  }

  document.getElementById('periodo-txt').textContent=`${mesLbl(meses[0])} — ${mesLbl(meses[meses.length-1])} · ${meses.length} meses`;
  const labels=meses.map(mesLbl);

  // ── KPIs ──
  const totF=meses.reduce((s,m)=>s+data[m].ft,0);
  const totU=meses.reduce((s,m)=>s+data[m].ut,0);
  const totR=meses.reduce((s,m)=>s+data[m].rc,0);
  const totN=meses.reduce((s,m)=>s+data[m].nf,0);
  const promM=totF/meses.length;
  const promU=totU/meses.length;
  const ticket=totN>0?totF/totN:0;
  const ult=meses[meses.length-1];
  const pen=meses.length>1?meses[meses.length-2]:null;
  const varF=pen&&data[pen].ft>0?((data[ult].ft-data[pen].ft)/data[pen].ft*100):0;
  const varU=pen&&data[pen].ut>0?((data[ult].ut-data[pen].ut)/data[pen].ut*100):0;
  const mesAA=(parseInt(ult.slice(0,4))-1)+'-'+ult.slice(5);
  const fAA=data[mesAA]?.ft||0;
  const varAA=fAA>0?((data[ult].ft-fAA)/fAA*100):null;

  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi"><div class="val">$${fmt(totF)}</div><div class="lbl">Facturación total</div>
      <div class="var ${varF>=0?'pos':'neg'}">${fmtPct(varF)} vs mes ant.</div></div>
    <div class="kpi"><div class="val">${fmtF(totU)}</div><div class="lbl">Unidades neumáticos</div>
      <div class="var ${varU>=0?'pos':'neg'}">${fmtPct(varU)} vs mes ant.</div></div>
    <div class="kpi"><div class="val">$${fmt(promM)}</div><div class="lbl">Promedio mensual</div></div>
    <div class="kpi"><div class="val">${fmtF(Math.round(promU))}</div><div class="lbl">Prom. uds/mes</div></div>
    <div class="kpi"><div class="val">$${fmtF(Math.round(ticket))}</div><div class="lbl">Ticket promedio</div>
      <div class="lbl" style="font-size:8px;margin-top:1px">${fmtF(totN)} facturas</div></div>
    <div class="kpi"><div class="val" style="color:var(--verde)">${fmtF(totR)}</div><div class="lbl">Recapados (uds)</div></div>
    ${varAA!==null?`<div class="kpi"><div class="val">$${fmt(data[ult].ft)}</div><div class="lbl">Último mes</div>
      <div class="var ${varAA>=0?'pos':'neg'}">${fmtPct(varAA)} vs año ant.</div></div>`:''}
  `;

  // Discover top marcas
  const marcaTotals={};
  meses.forEach(m=>{for(const [k,v] of Object.entries(data[m].fm||{})) marcaTotals[k]=(marcaTotals[k]||0)+v});
  _allMarcas=Object.entries(marcaTotals).sort((a,b)=>b[1]-a[1]).slice(0,12).map(e=>e[0]);
  _marcaColorMap={};
  _allMarcas.forEach((m,i)=>_marcaColorMap[m]=MARCA_PALETTE[i%MARCA_PALETTE.length]);

  // Init marca active sets on first run
  if(activeFM.size===0) activeFM=new Set(_allMarcas);
  if(activeUM.size===0) activeUM=new Set(_allMarcas);
  // Keep only valid marcas
  activeFM=new Set([..._allMarcas].filter(m=>activeFM.has(m)));
  activeUM=new Set([..._allMarcas].filter(m=>activeUM.has(m)));

  // Build filter chips
  buildSeriesChips('fc-cat-chips',CATS,CAT_COLORS,activeFC,'ch-fact-cat');
  buildSeriesChips('fc-marca-chips',_allMarcas,_marcaColorMap,activeFM,'ch-fact-marca');
  buildSeriesChips('uc-cat-chips',CATS,CAT_COLORS,activeUC,'ch-uds-cat');
  buildSeriesChips('uc-marca-chips',_allMarcas,_marcaColorMap,activeUM,'ch-uds-marca');

  rebuildCharts();
  buildTable();
}

function rebuildCharts(){
  const data=getData();
  const meses=MESES.filter(m=>data[m].ft!==0||data[m].ut!==0);
  if(!meses.length) return;
  const labels=meses.map(mesLbl);

  // Fact × Cat (line)
  const fcDS=[...activeFC].map(c=>({
    label:c, data:meses.map(m=>Math.round(data[m].fc[c]||0)),
    borderColor:CAT_COLORS[c]||'#999', backgroundColor:(CAT_COLORS[c]||'#999')+'22',
    fill:false, pointBackgroundColor:CAT_COLORS[c]||'#999'
  }));
  mkLine('ch-fact-cat',labels,fcDS);

  // Fact × Marca (line)
  const fmDS=[..._allMarcas].filter(m=>activeFM.has(m)).map(m=>({
    label:m, data:meses.map(me=>Math.round(data[me].fm[m]||0)),
    borderColor:_marcaColorMap[m]||'#999', backgroundColor:(_marcaColorMap[m]||'#999')+'22',
    fill:false, pointBackgroundColor:_marcaColorMap[m]||'#999'
  }));
  mkLine('ch-fact-marca',labels,fmDS);

  // Uds × Cat (line)
  const ucDS=[...activeUC].map(c=>({
    label:c, data:meses.map(m=>Math.round(data[m].uc[c]||0)),
    borderColor:CAT_COLORS[c]||'#999', backgroundColor:(CAT_COLORS[c]||'#999')+'22',
    fill:false, pointBackgroundColor:CAT_COLORS[c]||'#999'
  }));
  mkLine('ch-uds-cat',labels,ucDS,{yFmt:v=>fmtF(v)+' uds'});

  // Uds × Marca (line)
  const umDS=[..._allMarcas].filter(m=>activeUM.has(m)).map(m=>({
    label:m, data:meses.map(me=>Math.round(data[me].um[m]||0)),
    borderColor:_marcaColorMap[m]||'#999', backgroundColor:(_marcaColorMap[m]||'#999')+'22',
    fill:false, pointBackgroundColor:_marcaColorMap[m]||'#999'
  }));
  mkLine('ch-uds-marca',labels,umDS,{yFmt:v=>fmtF(v)+' uds'});
}

// ══ TABLE ══
function buildTable(){
  const mes=document.getElementById('sel-mes-tabla').value;
  const tbl=document.getElementById('tbl-detalle');
  const title=document.getElementById('tbl-title');
  const vendSel=document.getElementById('sel-vend').value;

  // Get ranking data
  const vMap=getVendRanking(mes);
  if(!vMap||!Object.keys(vMap).length){
    tbl.innerHTML='<tbody><tr><td class="empty">Sin datos</td></tr></tbody>';
    return;
  }

  const periodoTxt=mes==='__TODO__'?'Todo el período':mesLbl(mes);

  if(vendSel!=='__TODOS__'){
    // Single vendedor → monthly breakdown
    title.textContent=`Detalle mensual — ${vendSel}`;
    const data=getData();
    const meses=MESES.filter(m=>data[m].ft!==0||data[m].ut!==0);
    const catCols=CATS.filter(c=>meses.some(m=>(data[m].uc[c]||0)>0));
    let rows='',totF=0,totU=0,totR=0,totN=0;
    const totCat={};catCols.forEach(c=>totCat[c]=0);

    meses.forEach(m=>{
      const d=data[m];totF+=d.ft;totU+=d.ut;totR+=d.rc;totN+=d.nf;
      const cc=catCols.map(c=>{const v=Math.round(d.uc[c]||0);totCat[c]+=v;return`<td class="mono">${v||'—'}</td>`}).join('');
      const tk=d.nf>0?Math.round(d.ft/d.nf):0;
      rows+=`<tr><td style="font-weight:600">${mesLbl(m)}</td>
        <td class="mono">$${fmtF(Math.round(d.ft))}</td>
        <td class="mono">${fmtF(Math.round(d.ut))}</td>${cc}
        <td class="mono" style="color:var(--verde)">${d.rc||'—'}</td>
        <td class="mono">${d.nf||'—'}</td>
        <td class="mono">$${tk?fmtF(tk):'—'}</td></tr>`;
    });
    const totCC=catCols.map(c=>`<td class="mono" style="font-weight:700">${fmtF(totCat[c])||'—'}</td>`).join('');
    const totTk=totN>0?Math.round(totF/totN):0;
    tbl.innerHTML=`<thead><tr><th>Mes</th><th>Facturación</th><th>Uds Total</th>${catCols.map(c=>`<th>${c}</th>`).join('')}<th>Recapados</th><th>Facturas</th><th>Ticket</th></tr></thead>
    <tbody>${rows}<tr style="background:rgba(192,57,43,.05);font-weight:700;border-top:2px solid var(--r)">
    <td>TOTAL</td><td class="mono">$${fmtF(Math.round(totF))}</td><td class="mono">${fmtF(Math.round(totU))}</td>${totCC}
    <td class="mono" style="color:var(--verde)">${fmtF(totR)}</td><td class="mono">${fmtF(totN)}</td>
    <td class="mono">$${totTk?fmtF(totTk):'—'}</td></tr></tbody>`;
    return;
  }

  // All vendedores ranking
  title.textContent=`Ranking de vendedores — ${periodoTxt}`;
  const sorted=Object.entries(vMap).filter(([,d])=>d.ft>0).sort((a,b)=>b[1].ft-a[1].ft);
  const totalG=sorted.reduce((s,[,d])=>s+d.ft,0);
  const catCols=CATS.filter(c=>sorted.some(([,d])=>(d.uc[c]||0)>0));

  // Top marcas for this view
  const marcaTot={};
  sorted.forEach(([,d])=>{for(const [k,v] of Object.entries(d.fm||{})) marcaTot[k]=(marcaTot[k]||0)+v});
  const topM=Object.entries(marcaTot).sort((a,b)=>b[1]-a[1]).slice(0,6).map(e=>e[0]);

  let rows='',gF=0,gU=0,gR=0,gN=0;
  const gCat={};catCols.forEach(c=>gCat[c]=0);
  const gMarca={};topM.forEach(m=>gMarca[m]=0);

  sorted.forEach(([nom,d],i)=>{
    const pct=totalG>0?(d.ft/totalG*100).toFixed(1):0;
    const tk=d.nf>0?Math.round(d.ft/d.nf):0;
    gF+=d.ft;gU+=d.ut;gR+=d.rc;gN+=d.nf;
    const cc=catCols.map(c=>{const v=Math.round(d.uc[c]||0);gCat[c]+=v;return`<td class="mono">${v||'—'}</td>`}).join('');
    const mc=topM.map(m=>{const v=Math.round(d.um[m]||0);gMarca[m]+=v;return`<td class="mono">${v||'—'}</td>`}).join('');
    rows+=`<tr>
      <td class="rn ${i<3?'top':''}">${i+1}</td>
      <td><div style="font-weight:600;font-size:11px">${nom}</div></td>
      <td class="mono" style="font-weight:600">$${fmtF(Math.round(d.ft))}</td>
      <td class="mono">${pct}%</td>
      <td class="mono">${fmtF(Math.round(d.ut))}</td>
      ${cc}
      <td class="mono" style="color:var(--verde)">${d.rc||'—'}</td>
      ${mc}
      <td class="mono">${d.nf?fmtF(d.nf):'—'}</td>
      <td class="mono">$${tk?fmtF(tk):'—'}</td>
    </tr>`;
  });
  const gTk=gN>0?Math.round(gF/gN):0;
  const gCC=catCols.map(c=>`<td class="mono" style="font-weight:700">${fmtF(gCat[c])||'—'}</td>`).join('');
  const gMC=topM.map(m=>`<td class="mono" style="font-weight:700">${fmtF(gMarca[m])||'—'}</td>`).join('');

  tbl.innerHTML=`<thead><tr>
    <th>#</th><th>Vendedor</th><th>Facturación</th><th>%</th><th>Uds</th>
    ${catCols.map(c=>`<th>${c}</th>`).join('')}
    <th>Recap.</th>
    ${topM.map(m=>`<th style="color:var(--a)">${m}</th>`).join('')}
    <th>Facturas</th><th>Ticket</th>
  </tr></thead><tbody>${rows}
  <tr style="background:rgba(192,57,43,.05);font-weight:700;border-top:2px solid var(--r)">
    <td></td><td>TOTAL</td>
    <td class="mono">$${fmtF(Math.round(gF))}</td><td class="mono">100%</td>
    <td class="mono">${fmtF(Math.round(gU))}</td>${gCC}
    <td class="mono" style="color:var(--verde)">${fmtF(gR)}</td>${gMC}
    <td class="mono">${fmtF(gN)}</td>
    <td class="mono">$${gTk?fmtF(gTk):'—'}</td>
  </tr></tbody>`;
}

// ══ INIT ══
initChips();
initMesSelect();
updateVendSelect();
rebuild();
</script>
